# Compose-файл для этапов 1.5.1 / 1.5.2: SITL+Gazebo+video pipeline в shared network namespaces.
#
# Топология:
#   uav-net        - pause-контейнер «БАС-pod» (Kubernetes pod sandbox pattern).
#                    В netns инжектируются:
#                      eth0=10.10.0.2/24 → br-ctrl-near  (control)
#                      eth1=10.20.0.2/24 → br-pload-near (payload, для 1.5.2)
#   gazebo         - shares netns с uav-net. FDM 9002/9003 через loopback.
#   sitl           - shares netns с uav-net. MAVLink 5760 на loopback.
#   mavbridge      - UDP 14550 ↔ TCP 5760 (SITL), внутри uav-net netns.
#   video-sender   - GStreamer pipeline (videotestsrc / camera → x264 → RTP)
#                    через eth1 → ns-3 payload channel → bas-pload-far-net.
#   pload-far-net  - pause-контейнер для приёмной стороны видео.
#                    В netns инжектируется eth=10.20.0.3/24 → br-pload-far.
#   video-receiver - GStreamer pipeline (udpsrc → RTP → decode), shares netns
#                    с pload-far-net. Пишет video_rx.jsonl.
#
# Использование (через scripts/run_stage_1_5_1_mission.sh или run_stage_1_5_2_mission.sh):
#   docker compose -f docker-compose.shared-netns.yml up -d uav-net pload-far-net
#   # инжектируем veth извне
#   docker compose -f docker-compose.shared-netns.yml up -d gazebo sitl mavbridge
#   # (для 1.5.2) docker compose ... up -d video-sender video-receiver
#
# Образы не пересобираются: bas/gazebo-harmonic:dev, bas/ardupilot-sitl:dev собраны заранее;
# bas/video:dev собирается через `docker compose build video` (см. docker-compose.yml).

services:
  uav-net:
    image: busybox:latest
    container_name: bas-uav-net
    network_mode: none
    # sleep infinity нужен чтобы контейнер не вышел и netns не уничтожилось.
    # trap нужен чтобы реагировать на docker stop.
    command: ["sh", "-c", "trap : TERM INT; sleep infinity & wait"]

  gazebo:
    image: bas/gazebo-harmonic:dev
    container_name: bas-gazebo
    network_mode: "container:bas-uav-net"
    volumes:
      - ./gazebo:/work/gazebo:ro
      - ./logs:/work/logs
      # Optional WSLg/X11 mounts. With BAS_GAZEBO_GUI=1 they let Gazebo open
      # a real window on Windows; in headless mode they are harmless.
      - /tmp/.X11-unix:/tmp/.X11-unix
      - /mnt/wslg:/mnt/wslg
    environment:
      GZ_VERSION: harmonic
      BAS_GAZEBO_GUI: "${BAS_GAZEBO_GUI:-0}"
      DISPLAY: "${DISPLAY:-:0}"
      WAYLAND_DISPLAY: "${WAYLAND_DISPLAY:-wayland-0}"
      XDG_RUNTIME_DIR: "${XDG_RUNTIME_DIR:-/mnt/wslg/runtime-dir}"
      PULSE_SERVER: "${PULSE_SERVER:-unix:/mnt/wslg/PulseServer}"
      QT_X11_NO_MITSHM: "1"
      # Ограничиваем gz-transport на loopback. Без этого gz discovery шлёт
      # multicast UDP 239.255.0.7 на eth0 (т.е. через ns-3), что забивает
      # симулированный 20Мбит/с канал и ломает ARP/MAVLink для bas-ctrl-far.
      # IGN_* — legacy для Ignition; GZ_* — для Gazebo Harmonic gz-transport13.
      GZ_PARTITION: bas-uav-local
      GZ_IP: 127.0.0.1
      IGN_PARTITION: bas-uav-local
      IGN_IP: 127.0.0.1
      GZ_TRANSPORT_TOPIC_MULTICAST_NIC: lo
      # Resource path: container's ardupilot_gazebo первый, чтобы родной iris_runway.sdf +
      # iris_with_gimbal модель брались оттуда. Локальные ./gazebo/worlds и ./gazebo/models
      # доступны как fallback для кастомных миров (например stage 2.1 сценариев).
      GZ_SIM_RESOURCE_PATH: "/work/ardupilot_gazebo/models:/work/ardupilot_gazebo/worlds:/work/gazebo/worlds:/work/gazebo/models"
      # Default world = upstream iris_runway.sdf со встроенной iris_with_gimbal камерой
      # (это путь "видеопоток камеры Gazebo" по букве ТЗ — POV с борта дрона, тень+лопасти).
      BAS_GAZEBO_WORLD: "${BAS_GAZEBO_WORLD:-iris_runway.sdf}"
    command:
      - bash
      - -lc
      - |
        world="$${BAS_GAZEBO_WORLD:-iris_runway.sdf}"
        if [ "$${BAS_GAZEBO_GUI:-0}" = "1" ]; then
          exec gz sim -r -v3 "$${world}"
        fi
        unset DISPLAY WAYLAND_DISPLAY XDG_RUNTIME_DIR PULSE_SERVER
        exec gz sim -s -r -v3 "$${world}"
    depends_on:
      uav-net:
        condition: service_started

  sitl:
    image: bas/ardupilot-sitl:dev
    container_name: bas-sitl
    network_mode: "container:bas-uav-net"
    volumes:
      - ./ardupilot:/work/ardupilot:ro
      - ./logs:/work/logs
    command:
      - /home/ardupilot/ardupilot/build/sitl/bin/arducopter
      - -I0
      - --model
      - JSON
      - --speedup
      - "1"
      - --defaults
      - /home/ardupilot/ardupilot/Tools/autotest/default_params/gazebo-iris.parm
    depends_on:
      gazebo:
        condition: service_started

  # MAVLink bridge: TCP 127.0.0.1:5760 (SITL) <-> UDP 0.0.0.0:14550 (для GCS через ns-3).
  # UDP убирает TCP head-of-line blocking из радиоканала; TCP остаётся только локально
  # внутри shared netns между bridge и SITL.
  mavbridge:
    image: alpine/socat:latest
    container_name: bas-mavbridge
    network_mode: "container:bas-uav-net"
    command:
      - -d
      - UDP4-LISTEN:14550,reuseaddr
      - TCP4:127.0.0.1:5760,retry=30,interval=2
    depends_on:
      sitl:
        condition: service_started

  # ---- Stage 2.4 QGroundControl bridge ------------------------------------
  # Замена mavbridge для QGC-режима. Стандартный паттерн ardupilot-sitl-docker
  # (через MAVProxy --out udp:host) и mavlink-router/Intel здесь адаптирован
  # на bluenviron/mavp2p: один TCP client к SITL и несколько UDP server'ов
  # для одновременных GCS-клиентов. SITL TCP 5760 single-client, поэтому
  # mavbridge и mavrouter взаимоисключающие — wrapper останавливает первый
  # перед запуском второго.
  #
  # Endpoint scheme:
  #   tcpc:127.0.0.1:5760 — TCP client к SITL (внутри bas-uav netns)
  #   udps:0.0.0.0:14550  — UDP server для MAVProxy GCS (через ns-3 control)
  #   udps:0.0.0.0:14560  — UDP server для host-side socat → QGC bridge
  mavrouter:
    image: bluenviron/mavp2p:latest
    container_name: bas-mavrouter
    network_mode: "container:bas-uav-net"
    command:
      - tcpc:127.0.0.1:5760
      - udps:0.0.0.0:14550
      - udps:0.0.0.0:14560
    profiles: ["qgc"]
    depends_on:
      sitl:
        condition: service_started

  # Stage 1.7: LoRa Serial UAV-side bridge. ВМЕСТО mavbridge для LoRa-режима
  # (SITL TCP 5760 single-client, оба mavbridge и lora-uav-bridge не могут жить
  # одновременно). Соединяет host UNIX socket /tmp/bas-bridge/lora-uav.sock
  # (другой конец — ns-3 LoRa PtyApp UAV) с SITL primary serial TCP 5760.
  #
  # Цепочка для LoRa варианта: orchestrator (pymavlink serial:/tmp/ptyGCS_lora)
  # → host socat GCS → UNIX lora-gcs.sock → ns-3 container socat GCS → ns-3
  # GCS PtyApp → LoRa channel → ns-3 UAV PtyApp → ns-3 container socat UAV
  # → UNIX lora-uav.sock → ЭТОТ контейнер → SITL TCP 5760.
  lora-uav-bridge:
    image: alpine/socat:latest
    container_name: bas-lora-uav-bridge
    network_mode: "container:bas-uav-net"
    volumes:
      - /tmp/bas-bridge:/bridge
    # ВАЖНО: каждый -d отдельным элементом списка — socat parser требует
    # `-d` дважды как два аргумента, не один "-d -d".
    command:
      - -d
      - -d
      - UNIX-CONNECT:/bridge/lora-uav.sock,retry=30,interval=2
      - TCP4:127.0.0.1:5760,retry=30,interval=2
    profiles: ["lora"]
    depends_on:
      sitl:
        condition: service_started

  # ---- Stage 1.5.2 video pipeline -----------------------------------------
  # Симметричный pause-контейнер для bas-pload-far netns. Скрипт-обвязка
  # (run_stage_1_5_2_mission.sh) инжектирует в его netns veth → br-pload-far
  # и адрес 10.20.0.3/24. Receiver-контейнер крепится к этому netns через
  # network_mode: container:bas-pload-far-net.
  pload-far-net:
    image: busybox:latest
    container_name: bas-pload-far-net
    network_mode: none
    command: ["sh", "-c", "trap : TERM INT; sleep infinity & wait"]

  # Видео-sender: лежит в bas-uav netns (тот же что Gazebo/SITL/mavbridge).
  # Имеет eth0=10.10.0.2/24 (control, уже инжектирован) и eth1=10.20.0.2/24
  # (payload, инжектируется отдельно run-скриптом). Поток уходит на
  # 10.20.0.3:5000 через eth1 → br-pload-near → tap-pload-near → ns-3 pload
  # channel → tap-pload-far → eth в bas-pload-far-net.
  video-sender:
    image: bas/video:dev
    container_name: bas-video-sender
    network_mode: "container:bas-uav-net"
    # CPU-limit: x264 encoder под полной нагрузкой может занимать всё ядро,
    # вытесняя orchestrator listener (приходит к INVALID_SEQUENCE на degraded_lora,
    # см. docs/stage_1_5_2_plan.md). 0.8 ядра достаточно для 2000 kbps @ 30 fps
    # с tune=zerolatency speed-preset=ultrafast.
    cpus: "${BAS_VIDEO_SENDER_CPUS:-0.8}"
    volumes:
      - ./video:/work/video:ro
      - ./logs:/work/logs
    environment:
      BAS_VIDEO_SOURCE: "${BAS_VIDEO_SOURCE:-videotestsrc}"
      BAS_VIDEO_DEST_HOST: "${BAS_VIDEO_DEST_HOST:-10.20.0.3}"
      BAS_VIDEO_DEST_PORT: "${BAS_VIDEO_DEST_PORT:-5000}"
      BAS_VIDEO_BITRATE_KBPS: "${BAS_VIDEO_BITRATE_KBPS:-2000}"
      BAS_VIDEO_FPS: "${BAS_VIDEO_FPS:-30}"
      BAS_VIDEO_WIDTH: "${BAS_VIDEO_WIDTH:-640}"
      BAS_VIDEO_HEIGHT: "${BAS_VIDEO_HEIGHT:-480}"
      BAS_VIDEO_LOG: "${BAS_VIDEO_TX_LOG:-/work/logs/video_tx.jsonl}"
      BAS_CAMERA_UDP_PORT: "${BAS_CAMERA_UDP_PORT:-5600}"
    command: ["python3", "/work/video/sender.py"]
    depends_on:
      sitl:
        condition: service_started
      pload-far-net:
        condition: service_started

  # ---- Stage 2.4 FPV live stream (browser-side) ---------------------------
  # Принимает RTP H.264 от Gazebo iris_with_gimbal GstCameraPlugin (UDP 5600
  # на loopback внутри bas-uav netns), декодирует, перекодирует в JPEG и
  # раздаёт как multipart MJPEG поток через TCP 8766 (bind 0.0.0.0). С хоста
  # доступно через 10.10.0.2:8766 (control veth); Web GCS проксирует это в
  # /camera.mjpg для <img src="/camera.mjpg"/> в браузере.
  #
  # Не пересекается с 1.5.2 video-sender по сценариям: 1.5.2 пишет видео
  # через ns-3 в файл, fpv-mjpeg — лайв оператору без ns-3 hop'а. Оба
  # пытаются слушать UDP:5600, поэтому одновременно не поднимаются.
  fpv-mjpeg:
    image: bas/video:dev
    container_name: bas-fpv-mjpeg
    network_mode: "container:bas-uav-net"
    cpus: "${BAS_FPV_CPUS:-0.6}"
    volumes:
      - ./video:/work/video:ro
    environment:
      BAS_FPV_UDP_PORT: "${BAS_CAMERA_UDP_PORT:-5600}"
      BAS_FPV_MJPEG_PORT: "${BAS_FPV_MJPEG_PORT:-8766}"
      BAS_FPV_WIDTH: "${BAS_FPV_WIDTH:-640}"
      BAS_FPV_HEIGHT: "${BAS_FPV_HEIGHT:-480}"
      BAS_FPV_FPS: "${BAS_FPV_FPS:-15}"
      BAS_FPV_QUALITY: "${BAS_FPV_QUALITY:-70}"
      GST_DEBUG: "${BAS_FPV_GST_DEBUG:-2}"
    command: ["bash", "/work/video/fpv_mjpeg.sh"]
    profiles: ["fpv"]
    depends_on:
      uav-net:
        condition: service_started

  # Видео-receiver: в bas-pload-far netns.
  video-receiver:
    image: bas/video:dev
    container_name: bas-video-receiver
    network_mode: "container:bas-pload-far-net"
    volumes:
      - ./video:/work/video:ro
      - ./logs:/work/logs
    environment:
      BAS_VIDEO_LISTEN_PORT: "${BAS_VIDEO_DEST_PORT:-5000}"
      BAS_VIDEO_LOG: "${BAS_VIDEO_RX_LOG:-/work/logs/video_rx.jsonl}"
      BAS_VIDEO_RECORD_MP4: "${BAS_VIDEO_RECORD_MP4:-}"
    command: ["python3", "/work/video/receiver.py"]
    depends_on:
      pload-far-net:
        condition: service_started
