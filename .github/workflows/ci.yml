name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Отменяем устаревшие прогоны при новом push в ту же ветку.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------- lint
  lint:
    name: Lint & syntax
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bash syntax (bash -n)
        run: |
          set -e
          for f in install.sh $(find scripts -name '*.sh'); do bash -n "$f"; done
          echo "bash -n: OK"

      - name: Shellcheck (advisory)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends shellcheck
          # Advisory: не фейлим сборку на стилевых warning'ах.
          shellcheck -S error -e SC1091,SC2086,SC2155,SC2046 install.sh scripts/*.sh || true

      - name: Python compile (syntax gate)
        run: |
          set -e
          python -m compileall -q scripts orchestrator/src
          if [ -d analyzer/src ]; then python -m compileall -q analyzer/src; fi
          echo "compileall: OK"

      - name: YAML sanity
        run: |
          python -m pip install -q pyyaml
          python - <<'PY'
          import glob, yaml
          files = (glob.glob("configs/**/*.yml", recursive=True)
                   + glob.glob("configs/**/*.yaml", recursive=True)
                   + glob.glob("*.yml")
                   + glob.glob(".github/workflows/*.yml"))
          for f in sorted(set(files)):
              with open(f) as fh:
                  yaml.safe_load(fh)
              print("ok", f)
          PY

  # --------------------------------------------------------------- regression
  test:
    name: Offline regression suite
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create venv + install deps (no GPU / no Docker / no SITL)
        run: |
          set -e
          python -m venv .venv
          .venv/bin/pip install -q --upgrade pip
          .venv/bin/pip install -q msgpack numpy pyproj requests mavproxy
          .venv/bin/pip install -q -e ./orchestrator
          echo "deps:"; .venv/bin/pip list 2>/dev/null | grep -iE 'msgpack|numpy|pyproj|pydantic|pymavlink|pyyaml' || true

      - name: Run offline regression (run_all_smokes.sh)
        run: bash scripts/run_all_smokes.sh

  # --------------------------------------------------------------- web UI
  web-ui:
    name: Web GCS demo mode
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -q pymavlink mavproxy pyyaml requests

      - name: Probe demo UI (health + state + index)
        run: |
          set -e
          python scripts/gcs_web_ui_server.py --demo --host 127.0.0.1 --port 18765 \
              > /tmp/ui.log 2>&1 &
          UI_PID=$!
          ok=0
          for _ in $(seq 1 30); do
            if curl -fs http://127.0.0.1:18765/api/health > /tmp/health.json 2>/dev/null; then
              ok=1; break
            fi
            sleep 1
          done
          if [ "$ok" != 1 ]; then echo "GCS health endpoint never came up"; cat /tmp/ui.log; exit 1; fi
          echo "health: $(cat /tmp/health.json)"
          curl -fs http://127.0.0.1:18765/ -o /tmp/index.html
          curl -fs http://127.0.0.1:18765/api/state > /tmp/state.json
          python -c "import json; d=json.load(open('/tmp/state.json')); assert isinstance(d, dict); print('state keys:', list(d)[:8])"
          kill "$UI_PID" 2>/dev/null || true

  # --------------------------------------------------------------- docs
  docs:
    name: Docs sanity
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Required docs present
        run: |
          set -e
          for f in README.md CHANGELOG.md \
              docs/INSTALL.md docs/QUICKSTART.md docs/ARCHITECTURE.md \
              docs/DEMOS.md docs/STAGES.md docs/TROUBLESHOOTING.md \
              docs/CONTRIBUTING.md docs/tz_compliance.md docs/roadmap.md \
              docs/MODULE_MAP.md docs/SCENARIOS.md docs/LIMITATIONS.md docs/GLOSSARY.md; do
            [ -f "$f" ] && echo "OK $f" || { echo "MISSING $f"; exit 1; }
          done
